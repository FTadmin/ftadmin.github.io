<!DOCTYPE html>
<html lang="{{lang.code}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

{{> analytics-head}}

    <!-- Primary Meta Tags -->
    <title>{{meta.title}}</title>
    <meta name="title" content="{{meta.title}}">
    <meta name="description" content="{{meta.description}}">
{{#if meta.keywords}}
    <meta name="keywords" content="{{meta.keywords}}">
{{/if}}
    <meta name="author" content="{{site.author}}">
    <link rel="canonical" href="{{canonicalUrl}}">
{{#each langSwitcher}}
    <link rel="alternate" hreflang="{{code}}" href="{{fullUrl}}">
{{/each}}
    <link rel="alternate" hreflang="x-default" href="{{xDefaultUrl}}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:locale" content="{{ogLocale}}">
    <meta property="og:url" content="{{canonicalUrl}}">
    <meta property="og:title" content="{{meta.ogTitle}}">
    <meta property="og:description" content="{{meta.ogDescription}}">
    <meta property="og:image" content="{{meta.ogImage}}">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{canonicalUrl}}">
    <meta property="twitter:title" content="{{meta.ogTitle}}">
    <meta property="twitter:description" content="{{meta.twitterDescription}}">
    <meta property="twitter:image" content="{{meta.ogImage}}">

{{> head-assets}}

{{structuredDataHtml}}
</head>
<body>
{{> nav}}

<h1>{{pageTitle}}</h1>
{{intro}}

{{#each sections}}
<h2>{{heading}}</h2>
{{content}}
{{/each}}

{{> footer}}

{{> cookie-consent}}
<script>
(function(){
  if(document.documentElement.lang!=="en")return;
  if(document.cookie.indexOf("lang-chosen=1")!==-1)return;
  var map=[["pt-br","/pt-br"],["zh-Hans","/zh-Hans"],["zh-Hant","/zh-Hant"],["fr-ca","/fr-ca"],["nb","/nb"],["de","/de"],["es","/es"],["it","/it"],["ru","/ru"],["ja","/ja"],["fr","/fr"],["ko","/ko"],["sv","/sv"],["da","/da"],["fi","/fi"],["ar","/ar"],["ca","/ca"],["cs","/cs"],["el","/el"],["he","/he"],["hr","/hr"],["hu","/hu"],["nl","/nl"],["pl","/pl"],["pt","/pt"],["ro","/ro"],["sk","/sk"],["th","/th"],["tr","/tr"],["uk","/uk"],["vi","/vi"]];
  var lang=(navigator.language||navigator.userLanguage||"").toLowerCase();
  for(var i=0;i<map.length;i++){
    if(lang===map[i][0]||lang.startsWith(map[i][0]+"-")){
      document.cookie="lang-chosen=1;path=/;max-age=31536000";
      window.location.replace(map[i][1]+window.location.pathname+window.location.search);
      return;
    }
  }
})();
</script>
</body>
</html>
