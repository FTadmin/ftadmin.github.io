        for (var i = 0; i < prefixes.length; i++) {
            if (path.indexOf("/" + prefixes[i] + "/") === 0) {
                detectedLang = prefixes[i];
                break;
            }
        }

        var homeUrl = detectedLang ? "/" + detectedLang + "/" : "/";

        if (detectedLang && i18n[detectedLang]) {
            var t = i18n[detectedLang];
            document.getElementById("title").textContent = t.title;
            document.getElementById("message").textContent = t.message;
            document.getElementById("homeLink").textContent = t.button;
            document.documentElement.lang = detectedLang;
        }

        document.getElementById("homeLink").href = homeUrl;
